<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up - CampusBuy</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>CampusBuy</h1>
                <p>Buy & Sell with Campus Community</p>
            </div>

            <!-- Login Form -->
            <div id="loginForm" class="auth-form active">
                <h2>Login</h2>
                <form id="loginFormElement">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input 
                            type="email" 
                            id="loginEmail" 
                            placeholder="your@email.com" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input 
                            type="password" 
                            id="loginPassword" 
                            placeholder="Enter your password" 
                            required
                        >
                    </div>

                    <button type="submit" class="btn-submit">Login</button>

                    <div class="form-message" id="loginMessage"></div>
                </form>

                <p class="form-toggle">
                    Don't have an account? 
                    <a href="#" onclick="toggleForms()">Sign Up</a>
                </p>
            </div>

            <!-- Sign Up Form -->
            <div id="signupForm" class="auth-form">
                <h2>Create Account</h2>
                <form id="signupFormElement">
                    <div class="form-group">
                        <label for="signupName">Full Name</label>
                        <input 
                            type="text" 
                            id="signupName" 
                            placeholder="John Doe" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="signupEmail">Email</label>
                        <input 
                            type="email" 
                            id="signupEmail" 
                            placeholder="your@email.com" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="signupCollege">College Name</label>
                        <input 
                            type="text" 
                            id="signupCollege" 
                            placeholder="Your College" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="signupPhone">Phone Number</label>
                        <input 
                            type="tel" 
                            id="signupPhone" 
                            placeholder="10-digit number" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="signupPassword">Password</label>
                        <input 
                            type="password" 
                            id="signupPassword" 
                            placeholder="At least 6 characters" 
                            required
                        >
                    </div>

                    <button type="submit" class="btn-submit">Sign Up</button>

                    <div class="form-message" id="signupMessage"></div>
                </form>

                <p class="form-toggle">
                    Already have an account? 
                    <a href="#" onclick="toggleForms()">Login</a>
                </p>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
