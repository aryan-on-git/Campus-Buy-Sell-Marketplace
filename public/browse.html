<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Products - CampusBuy</title>
    <link rel="stylesheet" href="browse.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>CampusBuy</h1>
            </div>
            <div class="nav-menu">
                <a href="/" class="nav-link">Home</a>
                <a href="/browse.html" class="nav-link active">Browse</a>
                <a href="#" class="nav-link" id="sellLink">Sell</a>
                <div class="user-menu">
                    <span id="userDisplayName" class="user-name">User</span>
                    <button id="logoutBtn" class="btn-logout">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Search & Filter Section -->
    <div class="search-section">
        <div class="container">
            <div class="search-bar">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search products by name..."
                    class="search-input"
                >
                <button id="searchBtn" class="btn-search">Search</button>
            </div>

            <div class="filter-section">
                <label for="categoryFilter">Filter by Category:</label>
                <select id="categoryFilter" class="category-select">
                    <option value="">All Categories</option>
                    <option value="books">Books</option>
                    <option value="electronics">Electronics</option>
                    <option value="furniture">Furniture</option>
                    <option value="clothing">Clothing</option>
                    <option value="sports">Sports Equipment</option>
                    <option value="other">Other</option>
                </select>
                <button id="clearFilters" class="btn-clear">Clear Filters</button>
            </div>
        </div>
    </div>

    <!-- Products Section -->
    <div class="container">
        <div class="products-header">
            <h2>Available Products</h2>
            <p id="productCount" class="product-count">Loading...</p>
        </div>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="spinner"></div>

        <!-- Products Grid -->
        <div id="productsGrid" class="products-grid">
            <!-- Products will be inserted here by JavaScript -->
        </div>

        <!-- No Products Message -->
        <div id="noProducts" class="no-products" style="display: none;">
            <p>No products found. Try adjusting your search or filters!</p>
        </div>
    </div>

    <!-- Sell Product Modal -->
    <div id="sellModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Create Product Listing</h2>
            <form id="sellForm">
                <div class="form-group">
                    <label for="productName">Product Name</label>
                    <input type="text" id="productName" required>
                </div>

                <div class="form-group">
                    <label for="productDescription">Description</label>
                    <textarea id="productDescription" rows="4" required></textarea>
                </div>

                <div class="form-group">
                    <label for="productCategory">Category</label>
                    <select id="productCategory" required>
                        <option value="">Select Category</option>
                        <option value="books">Books</option>
                        <option value="electronics">Electronics</option>
                        <option value="furniture">Furniture</option>
                        <option value="clothing">Clothing</option>
                        <option value="sports">Sports Equipment</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="productPrice">Price (₹)</label>
                    <input type="number" id="productPrice" min="0" required>
                </div>

                <div class="form-group">
                    <label for="productCondition">Condition</label>
                    <select id="productCondition" required>
                        <option value="">Select Condition</option>
                        <option value="new">New</option>
                        <option value="like-new">Like New</option>
                        <option value="good">Good</option>
                        <option value="fair">Fair</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit-product">Create Listing</button>
                <div id="sellMessage" class="form-message"></div>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 CampusBuy. All rights reserved.</p>
    </footer>

    <script src="browse.js"></script>
</body>
</html>
